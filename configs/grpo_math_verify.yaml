model:
  model_name_or_path: "Qwen/Qwen2.5-0.5B"
  tokenizer_name: null

algorithm:
  name: "grpo"
  group_size: 4
  clip_eps: 0.2
  kl_coef: 0.1
  grpo_epochs: 1
  num_mini_batches: 1
  max_grad_norm: 1.0

training:
  lr: 1.0e-6
  batch_size: 2
  max_steps: 500
  log_interval: 1
  save_interval: 100
  save_dir: "./checkpoints/grpo_math"

generation:
  max_new_tokens: 512
  temperature: 0.7
  top_p: 0.95
  do_sample: true

data:
  source: "list"
  prompts:
    - "What is 2 + 3 * 4? <answer>14</answer>"
    - "Solve for x: 2x + 6 = 20. <answer>7</answer>"
    - "What is the derivative of x^3 + 2x? <answer>3*x^2 + 2</answer>"
    - "What is 1/3 + 1/6? <answer>1/2</answer>"
    - "Simplify: (x^2 - 4) / (x - 2). <answer>x + 2</answer>"
    - "What is sqrt(144)? <answer>12</answer>"
    - "If f(x) = 3x - 1, what is f(5)? <answer>14</answer>"
    - "What is 15% of 200? <answer>30</answer>"
  max_prompt_length: 512

fsdp:
  sharding_strategy: "full_shard"
  mixed_precision: "bf16"
  cpu_offload: false

reward:
  type: "math_verify"
  correct_reward: 1.0
  incorrect_reward: -0.5
  format_reward: 0.1
  unparseable_reward: -0.1

wandb:
  enabled: false
  project: "rl-posttrain-math"
  name: null
